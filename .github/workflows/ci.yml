name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ollama-auth-sidecar:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check image size (must be < 75 MB uncompressed)
        run: |
          # 75 MB uncompressed — nginx:1.27-alpine (~43 MB) + yq binary (~20 MB) + gettext (~2 MB)
          # Compressed (pushed) size is typically 20-25 MB.
          size=$(docker image inspect ollama-auth-sidecar:ci --format '{{.Size}}')
          limit=$((75 * 1024 * 1024))
          echo "Image size: ${size} bytes (limit: ${limit} bytes)"
          if [ "${size}" -gt "${limit}" ]; then
            echo "ERROR: Image exceeds 75 MB uncompressed limit (${size} bytes)"
            exit 1
          fi

      - name: Validate nginx config rendering
        run: |
          # Smoke-test: entrypoint renders config and nginx -t passes; container exits 0 on success
          # We use timeout to stop after nginx forks (it would otherwise run forever)
          timeout 10 docker run --rm \
            -e OPENWEBUI_KEY=test-key \
            -v "${{ github.workspace }}/tests/fixtures/ci-config.yaml:/etc/ollama-auth-sidecar/config.yaml:ro" \
            ollama-auth-sidecar:ci 2>&1 || true
          # A non-zero exit from timeout (exit 124) is expected when nginx starts successfully.
          # The integration tests below provide full validation.

      - name: Run integration tests
        run: |
          chmod +x tests/*.sh
          bash tests/run-all.sh
